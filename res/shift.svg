  <g transform="translate(40,20)"><line x1="-1.5" y1="0" x2="1.5" y2="0" stroke="#0066ff" stroke-width="0.2"/><line x1="0" y1="-1.5" x2="0" y2="1.5" stroke="#0066ff" stroke-width="0.2"/><circle cx="0" cy="0" r="1.2" fill="none" stroke="#0066ff" stroke-width="0.15"/></g>
