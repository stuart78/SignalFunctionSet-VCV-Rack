  <text x="22" y="35" text-anchor="middle" font-family="sans-serif" font-size="1.3" fill="#808080">MODE</text>
  <text x="44" y="35" text-anchor="middle" font-family="sans-serif" font-size="1.3" fill="#808080">OUT</text>

