  <g transform="translate(14,106)"><line x1="-2" y1="0" x2="2" y2="0" stroke="#ff0000" stroke-width="0.2"/><line x1="0" y1="-2" x2="0" y2="2" stroke="#ff0000" stroke-width="0.2"/><circle cx="0" cy="0" r="1.5" fill="none" stroke="#ff0000" stroke-width="0.15"/></g>
